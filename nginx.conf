# ============================================
#  NJUXun Nginx 反向代理配置
#  将 80 端口请求转发到本地 3000 端口的 Express 应用
#
#  部署方式：
#  1. 将此文件复制到服务器: scp nginx.conf root@110.40.172.12:/etc/nginx/conf.d/njuxun.conf
#  2. 测试配置: nginx -t
#  3. 重载: systemctl reload nginx
# ============================================

server {
    listen 80;
    server_name 110.40.172.12;

    # 将来有域名后改为你的域名，例如 server_name njuxun.example.com;

    # 前端静态资源和 API 全部转发到 Express 应用
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
